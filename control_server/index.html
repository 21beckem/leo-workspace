<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LEO Control</title>
<style>

/* ── Design tokens ───────────────────────────────────────────────── */
:root {
  --bg:          #09090c;
  --surface:     #111118;
  --surface2:    #1a1a24;
  --border:      #252535;
  --border-hi:   #353550;
  --text:        #c4c4d4;
  --text-dim:    #55556a;
  --fwd:         #00e87a;
  --fwd-dim:     rgba(0,232,122,0.12);
  --rev:         #ff3b3b;
  --rev-dim:     rgba(255,59,59,0.12);
  --accent:      #5b6cff;
  --stop-amber:  #f5a623;
  --radius:      6px;
}

/* ── Light theme overrides ───────────────────────────────────────── */
:root[data-theme="light"] {
  --bg:          #f0f0f4;
  --surface:     #ffffff;
  --surface2:    #e8e8f0;
  --border:      #ccccdc;
  --border-hi:   #aaaacc;
  --text:        #1a1a2e;
  --text-dim:    #8888a4;
  --fwd:         #00a050;
  --fwd-dim:     rgba(0,160,80,0.10);
  --rev:         #cc2020;
  --rev-dim:     rgba(204,32,32,0.10);
  --accent:      #4455ee;
  --stop-amber:  #c47a00;
}

/* ── Reset & base ────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', Courier, monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  transition: background 0.2s, color 0.2s;
  background-image: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(255,255,255,0.012) 2px,
    rgba(255,255,255,0.012) 4px
  );
}
:root[data-theme="light"] body {
  background-image: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.018) 3px,
    rgba(0,0,0,0.018) 4px
  );
}

/* ── Header ──────────────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 12px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  font-weight: bold;
  letter-spacing: 0.18em;
  color: var(--text);
  white-space: nowrap;
}

.status-pip {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
  background: var(--rev);
  box-shadow: 0 0 8px var(--rev);
  transition: background 0.3s, box-shadow 0.3s;
}
.status-pip.connecting {
  background: var(--stop-amber);
  box-shadow: 0 0 8px var(--stop-amber);
  animation: blink 0.9s ease-in-out infinite;
}
.status-pip.connected {
  background: var(--fwd);
  box-shadow: 0 0 8px var(--fwd);
  animation: none;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.25; }
}

/* Emergency stop in header */
.btn-theme {
  background: none;
  color: var(--text-dim);
  border: 1px solid var(--border);
  padding: 6px 14px;
  font-family: inherit;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 0.12em;
  cursor: pointer;
  border-radius: 4px;
  transition: border-color 0.15s, color 0.15s;
  white-space: nowrap;
}
.btn-theme:hover { border-color: var(--accent); color: var(--text); }

/* Power off button */
.btn-poweroff {
  background: none;
  color: var(--text-dim);
  border: 1px solid var(--border);
  padding: 6px 14px;
  font-family: inherit;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 0.12em;
  cursor: pointer;
  border-radius: 4px;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  white-space: nowrap;
}
.btn-poweroff:hover  { border-color: var(--stop-amber); color: var(--stop-amber); }
.btn-poweroff:active { opacity: 0.7; }

.btn-emergency {
  background: var(--rev);
  color: #fff;
  border: none;
  padding: 8px 20px;
  font-family: inherit;
  font-size: 12px;
  font-weight: bold;
  letter-spacing: 0.12em;
  cursor: pointer;
  border-radius: var(--radius);
  transition: background 0.12s, transform 0.08s;
  flex-shrink: 0;
}
.btn-emergency:hover  { background: #cc2020; }
.btn-emergency:active { transform: scale(0.94); background: #aa1010; }

/* ── Connection bar ──────────────────────────────────────────────── */
.connect-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.field-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.field-group label {
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--text-dim);
}
.field-group input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  padding: 5px 10px;
  border-radius: 4px;
  outline: none;
  transition: border-color 0.15s;
}
.field-group input:focus { border-color: var(--accent); }
#hostInput { width: 155px; }
#portInput { width: 64px; }

.btn-connect {
  background: var(--surface2);
  color: var(--text-dim);
  border: 1px solid var(--border);
  padding: 6px 16px;
  font-family: inherit;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 0.12em;
  cursor: pointer;
  border-radius: 4px;
  transition: border-color 0.15s, color 0.15s;
}
.btn-connect:hover { border-color: var(--accent); color: var(--text); }
.btn-connect.live  { border-color: var(--fwd); color: var(--fwd); }

.status-label {
  font-size: 11px;
  color: var(--text-dim);
  margin-left: auto;
  white-space: nowrap;
}

/* ── Motor grid ──────────────────────────────────────────────────── */
.motor-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  padding: 18px;
  flex: 1;
  align-content: start;
}

@media (max-width: 640px) {
  .motor-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 12px; }
}
@media (max-width: 340px) {
  .motor-grid { grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px; }
}

/* ── Motor card ──────────────────────────────────────────────────── */
.motor-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 10px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  transition: border-color 0.25s, box-shadow 0.25s;
  position: relative;
  overflow: hidden;
}

/* Faint corner glow when active */
.motor-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 8px;
  opacity: 0;
  transition: opacity 0.25s;
  pointer-events: none;
}
.motor-card.fwd::before { background: var(--fwd-dim);  opacity: 1; }
.motor-card.rev::before { background: var(--rev-dim);  opacity: 1; }
.motor-card.fwd { border-color: rgba(0,232,122,0.25); box-shadow: 0 0 20px rgba(0,232,122,0.06); }
.motor-card.rev { border-color: rgba(255,59,59,0.25);  box-shadow: 0 0 20px rgba(255,59,59,0.06); }

.motor-tag {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  position: relative;
  z-index: 1;
}

.motor-letter {
  font-size: 30px;
  font-weight: bold;
  line-height: 1;
  color: var(--text);
  position: relative;
  z-index: 1;
  transition: color 0.2s;
}
.motor-card.fwd .motor-letter { color: var(--fwd); }
.motor-card.rev .motor-letter { color: var(--rev); }

/* ── Vertical bidirectional slider ───────────────────────────────── */
.slider-zone {
  position: relative;
  width: 52px;
  height: 188px;
  cursor: ns-resize;
  touch-action: none;         /* own the touch — don't pass to scroll */
  user-select: none;
  z-index: 1;
}

.slider-rail {
  position: absolute;
  left: 50%;
  top: 0;
  transform: translateX(-50%);
  width: 6px;
  height: 100%;
  background: var(--surface2);
  border-radius: 3px;
}

/* tick marks at 25%, 50% (center), 75% */
.slider-rail::before,
.slider-rail::after {
  content: '';
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 1px;
}
/* center divider */
.slider-rail::after {
  width: 20px;
  height: 2px;
  top: 50%;
  margin-top: -1px;
  background: var(--border-hi);
}
/* quarter marks */
.slider-rail::before {
  width: 12px;
  height: 1px;
  top: 25%;
  background: var(--border);
  box-shadow: 0 calc(50% + 1px) 0 var(--border);  /* mirror at 75% */
}

.slider-fill {
  position: absolute;
  left: 0;
  width: 100%;
  border-radius: 3px;
  pointer-events: none;
  transition: none;
}

.slider-thumb {
  position: absolute;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 30px;
  height: 30px;
  background: var(--surface);
  border: 2px solid var(--border-hi);
  border-radius: 50%;
  pointer-events: none;
  transition: border-color 0.12s, box-shadow 0.12s;
  /* grip lines */
  background-image: repeating-linear-gradient(
    90deg,
    transparent 0, transparent 3px,
    var(--border-hi) 3px, var(--border-hi) 4px
  );
  background-position: center;
  background-size: 16px 8px;
  background-repeat: no-repeat;
}
.slider-zone.dragging .slider-thumb {
  border-color: var(--text);
  box-shadow: 0 0 0 4px rgba(196,196,212,0.1);
}
.motor-card.fwd .slider-thumb { border-color: var(--fwd); }
.motor-card.rev .slider-thumb { border-color: var(--rev); }

/* ── Readout & stop button ───────────────────────────────────────── */
.motor-readout {
  font-size: 11px;
  letter-spacing: 0.09em;
  color: var(--text-dim);
  min-height: 15px;
  text-align: center;
  position: relative;
  z-index: 1;
}
.motor-card.fwd .motor-readout { color: var(--fwd); }
.motor-card.rev .motor-readout { color: var(--rev); }

.btn-motor-stop {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 10px;
  font-weight: bold;
  letter-spacing: 0.12em;
  padding: 5px 0;
  width: 100%;
  border-radius: 4px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  position: relative;
  z-index: 1;
}
.btn-motor-stop:hover {
  border-color: var(--stop-amber);
  color: var(--stop-amber);
}
.btn-motor-stop:active { opacity: 0.7; }

/* ── Slider-type toggle ──────────────────────────────────────────── */
.type-toggle {
  display: flex;
  gap: 8px;
  align-items: center;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  position: relative;
  z-index: 1;
}
.type-toggle button {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 3px;
  cursor: pointer;
  transition: border-color 0.12s, color 0.12s;
}
.type-toggle button.sel {
  border-color: var(--accent);
  color: var(--text);
}

/* ── Speed + direction controls (second mode) ────────────────────── */
.speed-dir-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  width: 100%;
  position: relative;
  z-index: 1;
}

/* Direction toggle */
.dir-toggle {
  display: flex;
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.dir-toggle button {
  flex: 1;
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 10px;
  font-weight: bold;
  letter-spacing: 0.1em;
  padding: 5px 0;
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
}
.dir-toggle button:first-child { border-right: 1px solid var(--border); }
.dir-toggle button.active-fwd { background: rgba(0,232,122,0.15); color: var(--fwd); }
.dir-toggle button.active-rev { background: rgba(255,59,59,0.15);  color: var(--rev); }

/* Speed-only unidirectional slider (horizontal) */
.speed-slider-wrap {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 6px;
}
.speed-slider-wrap input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  border-radius: 3px;
  background: var(--surface2);
  outline: none;
  cursor: pointer;
}
.speed-slider-wrap input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--surface2);
  border: 2px solid var(--border-hi);
  cursor: pointer;
}
.speed-slider-wrap input[type="range"]::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--surface2);
  border: 2px solid var(--border-hi);
  cursor: pointer;
}
.btn-momentary {
  background: var(--surface2);
  color: var(--text-dim);
  border: 1px solid var(--border);
  padding: 6px 14px;
  font-family: inherit;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 0.12em;
  cursor: pointer;
  border-radius: 4px;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  white-space: nowrap;
}
.btn-momentary:hover { border-color: var(--stop-amber); color: var(--stop-amber); }
.btn-momentary.on {
  border-color: var(--stop-amber);
  color: var(--stop-amber);
  background: rgba(245,166,35,0.08);
}

.speed-pct {
  font-size: 11px;
  color: var(--text-dim);
  min-width: 36px;
  text-align: right;
}

</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────── -->
<header>
  <div class="brand">
    <span class="status-pip" id="pip"></span>
    ROBOT CONTROL
  </div>
  <button class="btn-theme" id="themeBtn">☀ LIGHT</button>
  <button class="btn-poweroff" id="poweroffBtn" title="Safely power off the Raspberry Pi">⏻ POWER OFF</button>
  <button class="btn-emergency" id="stopAllBtn">■ STOP ALL</button>
</header>

<!-- ── Connection bar ─────────────────────────────────────────────── -->
<div class="connect-bar">
  <div class="field-group">
    <label for="hostInput">HOST</label>
    <input type="text" id="hostInput" placeholder="192.168.1.100" autocomplete="off" spellcheck="false" />
  </div>
  <div class="field-group">
    <label for="portInput">PORT</label>
    <input type="text" id="portInput" inputmode="numeric" value="9300" />
  </div>
  <button class="btn-connect" id="connectBtn">CONNECT</button>
  <button class="btn-momentary" id="momentaryBtn" title="When ON, releasing a slider snaps it back to zero">MOMENTARY: OFF</button>
  <span class="status-label" id="statusLabel">Not connected</span>
</div>

<!-- ── Motor grid (built by JS) ───────────────────────────────────── -->
<div class="motor-grid" id="motorGrid"></div>


<script>
'use strict';

// ─────────────────────────────────────────────────────────────────────────────
//  Constants
// ─────────────────────────────────────────────────────────────────────────────
const MOTOR_NAMES  = ['A','B','C','D','E','F','G','H'];
const SNAP_ZONE    = 0.04;  // snap to 0 within ±4 % of centre
const THROTTLE_MS  = 33;    // max send rate ~30 fps
const TRACK_H      = 188;   // must match CSS .slider-zone height

// ─────────────────────────────────────────────────────────────────────────────
//  WebSocket connection
// ─────────────────────────────────────────────────────────────────────────────
let ws = null;

const pip         = document.getElementById('pip');
const statusLabel = document.getElementById('statusLabel');
const connectBtn  = document.getElementById('connectBtn');
const hostInput   = document.getElementById('hostInput');
const portInput   = document.getElementById('portInput');
const stopAllBtn  = document.getElementById('stopAllBtn');
const poweroffBtn = document.getElementById('poweroffBtn');
const themeBtn    = document.getElementById('themeBtn');
const momentaryBtn = document.getElementById('momentaryBtn');

// ── Theme ──────────────────────────────────────────────────────────
let darkMode = localStorage.getItem('robot_theme') !== 'light';

function applyTheme() {
  document.documentElement.dataset.theme = darkMode ? 'dark' : 'light';
  themeBtn.textContent = darkMode ? '☀ LIGHT' : '☽ DARK';
  localStorage.setItem('robot_theme', darkMode ? 'dark' : 'light');
}

themeBtn.addEventListener('click', () => { darkMode = !darkMode; applyTheme(); });
applyTheme();

poweroffBtn.addEventListener('click', () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    alert('Not connected to the robot — connect first before powering off.');
    return;
  }
  const confirmed = confirm(
    'Power off the Raspberry Pi?\n\nThis will stop all motors and shut the robot down. You will need physical access to turn it back on.'
  );
  if (confirmed) {
    sendMsg({ type: 'stop_all' });
    sendMsg({ type: 'poweroff' });
    setConnectionState('', 'Shutting down…');
  }
});

let momentary = localStorage.getItem('robot_momentary') === 'true';

function applyMomentary() {
  momentaryBtn.textContent = `MOMENTARY: ${momentary ? 'ON' : 'OFF'}`;
  momentaryBtn.classList.toggle('on', momentary);
}

momentaryBtn.addEventListener('click', () => {
  momentary = !momentary;
  localStorage.setItem('robot_momentary', momentary);
  applyMomentary();
  if (momentary) {
    sendMsg({ type: 'stop_all' });
    sliders.forEach(s => s.resetVisual());
  }
});

function setConnectionState(state, label) {
  pip.className = 'status-pip ' + state;
  statusLabel.textContent = label;
  const live = state === 'connected';
  connectBtn.textContent = live ? 'DISCONNECT' : 'CONNECT';
  connectBtn.classList.toggle('live', live);
}

function sendMsg(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
    return true;
  }
  return false;
}

function connect() {
  const host = hostInput.value.trim();
  const port = portInput.value.trim() || '9300';
  if (!host) { statusLabel.textContent = 'Enter a host address'; return; }

  // Persist for next visit
  localStorage.setItem('robot_host', host);
  localStorage.setItem('robot_port', port);

  const url = `ws://${host}:${port}/ws`;
  setConnectionState('connecting', `Connecting to ${url} …`);

  ws = new WebSocket(url);

  ws.onopen = () => {
    setConnectionState('connected', `Connected — ${host}:${port}`);
  };

  ws.onclose = () => {
    setConnectionState('', 'Disconnected');
    ws = null;
    // Server already stopped motors on disconnect; just reset slider visuals
    sliders.forEach(s => s.resetVisual());
  };

  ws.onerror = () => {
    setConnectionState('', 'Connection error — is the server running?');
  };

  ws.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'error') console.warn('[Server]', d.message);
    } catch {}
  };
}

function disconnect() {
  if (ws) {
    sendMsg({ type: 'stop_all' });
    ws.close();
    ws = null;
  }
  setConnectionState('', 'Disconnected');
}

connectBtn.addEventListener('click', () => {
  ws ? disconnect() : connect();
});

stopAllBtn.addEventListener('click', () => {
  sendMsg({ type: 'stop_all' });
  sliders.forEach(s => s.setValue(0, false));
});


// ─────────────────────────────────────────────────────────────────────────────
//  MotorCard — manages one motor's DOM + two control modes
// ─────────────────────────────────────────────────────────────────────────────
class MotorCard {
  constructor(name) {
    this.name     = name;
    this.value    = 0;       // -1 … 1 (negative = reverse)
    this.mode     = 'bidir'; // 'bidir' | 'split'
    this._lastSentAt = 0;

    // split-mode state
    this._splitDir   = 1;    // 1 = forward, -1 = reverse
    this._splitSpeed = 0;    // 0 … 1

    this.el = this._buildDOM();
    this._updateVisuals();
  }

  // ── DOM construction ─────────────────────────────────────────────
  _buildDOM() {
    const card = document.createElement('div');
    card.className = 'motor-card';
    card.innerHTML = `
      <div class="motor-tag">MOTOR</div>
      <div class="motor-letter">${this.name}</div>

      <div class="type-toggle">
        <button data-mode="bidir" class="sel">BIDIR</button>
        <button data-mode="split">SPLIT</button>
      </div>

      <!-- Bidirectional vertical slider -->
      <div class="slider-zone" id="sz-${this.name}" style="display:flex;flex-direction:column;align-items:center;">
        <div class="slider-rail" id="rail-${this.name}">
          <div class="slider-fill" id="fill-${this.name}"></div>
          <div class="slider-thumb" id="thumb-${this.name}"></div>
        </div>
      </div>

      <!-- Split: direction + speed slider -->
      <div class="speed-dir-wrap" id="sdw-${this.name}" style="display:none;">
        <div class="dir-toggle">
          <button data-dir="1"  class="active-fwd">FWD</button>
          <button data-dir="-1"                   >REV</button>
        </div>
        <div class="speed-slider-wrap">
          <input type="range" min="0" max="100" value="0" id="spd-${this.name}" />
          <span class="speed-pct" id="spct-${this.name}">0%</span>
        </div>
      </div>

      <div class="motor-readout" id="ro-${this.name}">---</div>
      <button class="btn-motor-stop" id="mstop-${this.name}">■ STOP</button>
    `;

    // Cache refs
    this._card   = card;
    this._sz     = card.querySelector(`#sz-${this.name}`);
    this._rail   = card.querySelector(`#rail-${this.name}`);
    this._fill   = card.querySelector(`#fill-${this.name}`);
    this._thumb  = card.querySelector(`#thumb-${this.name}`);
    this._sdw    = card.querySelector(`#sdw-${this.name}`);
    this._spdIn  = card.querySelector(`#spd-${this.name}`);
    this._spct   = card.querySelector(`#spct-${this.name}`);
    this._ro     = card.querySelector(`#ro-${this.name}`);

    // Mode toggle
    card.querySelectorAll('.type-toggle button').forEach(btn => {
      btn.addEventListener('click', () => this._setMode(btn.dataset.mode));
    });

    // Direction buttons (split mode)
    card.querySelectorAll('.dir-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        this._splitDir = parseInt(btn.dataset.dir);
        this._syncSplitDirUI();
        this._commitSplit();
      });
    });

    // Speed slider (split mode)
    this._spdIn.addEventListener('input', () => {
      this._splitSpeed = parseInt(this._spdIn.value) / 100;
      this._spct.textContent = `${this._spdIn.value}%`;
      this._commitSplit();
    });

    this._spdIn.addEventListener('pointerup', () => {
      if (momentary) {
        this._splitSpeed = 0;
        this._spdIn.value = 0;
        this._spct.textContent = '0%';
        this.setValue(0, false);
        this._forceSend();
      }
    });

    // Per-motor stop button
    card.querySelector(`#mstop-${this.name}`).addEventListener('click', e => {
      e.stopPropagation();
      this.setValue(0);
      this._forceSend();
    });

    // Bidirectional slider drag
    this._attachBidirEvents();

    return card;
  }

  // ── Mode switching ───────────────────────────────────────────────
  _setMode(mode) {
    this.mode = mode;
    this._card.querySelectorAll('.type-toggle button').forEach(b => {
      b.classList.toggle('sel', b.dataset.mode === mode);
    });
    const bidir = mode === 'bidir';
    this._sz.style.display  = bidir ? 'flex' : 'none';
    this._sdw.style.display = bidir ? 'none' : 'flex';

    // Carry value across modes
    if (mode === 'split') {
      this._splitDir   = this.value >= 0 ? 1 : -1;
      this._splitSpeed = Math.abs(this.value);
      this._spdIn.value = Math.round(this._splitSpeed * 100);
      this._spct.textContent = `${this._spdIn.value}%`;
      this._syncSplitDirUI();
    } else {
      // bidir ← take split state
      this.setValue(this._splitDir * this._splitSpeed, false);
    }
  }

  _syncSplitDirUI() {
    this._card.querySelectorAll('.dir-toggle button').forEach(b => {
      const d = parseInt(b.dataset.dir);
      b.classList.remove('active-fwd', 'active-rev');
      if (d === this._splitDir) b.classList.add(d > 0 ? 'active-fwd' : 'active-rev');
    });
  }

  _commitSplit() {
    this.setValue(this._splitDir * this._splitSpeed);
  }

  // ── Bidirectional slider pointer events ──────────────────────────
  _attachBidirEvents() {
    const zone = this._sz;
    let dragging = false;

    const valueFromEvent = (e) => {
      const rect = this._rail.getBoundingClientRect();
      const relY  = e.clientY - rect.top;
      const clamp = Math.max(0, Math.min(rect.height, relY));
      let v = 1 - (clamp / rect.height) * 2; // 1 at top, -1 at bottom
      if (Math.abs(v) < SNAP_ZONE) v = 0;
      return v;
    };

    zone.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      zone.setPointerCapture(e.pointerId);
      dragging = true;
      zone.classList.add('dragging');
      this.setValue(valueFromEvent(e));
    });

    zone.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      this.setValue(valueFromEvent(e));
    });

    const endDrag = () => {
      if (!dragging) return;
      dragging = false;
      zone.classList.remove('dragging');
      if (momentary) {
        this.setValue(0, false);
        this._forceSend();
      } else {
        this._forceSend(); // guarantee final value is sent
      }
    };

    zone.addEventListener('pointerup',     endDrag);
    zone.addEventListener('pointercancel', endDrag);
  }

  // ── Value management ─────────────────────────────────────────────
  setValue(v, send = true) {
    if (Math.abs(v) < SNAP_ZONE) v = 0;
    v = Math.max(-1, Math.min(1, v));
    this.value = v;
    this._updateVisuals();
    if (send) this._throttledSend();
  }

  resetVisual() {
    // Server stopped the motors; just sync the UI without re-sending
    this.value = 0;
    this._splitSpeed = 0;
    this._spdIn.value = 0;
    this._spct.textContent = '0%';
    this._updateVisuals();
  }

  _throttledSend() {
    const now = Date.now();
    if (now - this._lastSentAt >= THROTTLE_MS) {
      sendMsg({ type: 'motor', motor: this.name, value: this.value });
      this._lastSentAt = now;
    }
  }

  _forceSend() {
    sendMsg({ type: 'motor', motor: this.name, value: this.value });
    this._lastSentAt = Date.now();
  }

  // ── Visuals ──────────────────────────────────────────────────────
  _updateVisuals() {
    const v = this.value;

    // Thumb position on vertical track (TRACK_H matches CSS)
    const thumbTopPx = ((1 - v) / 2) * TRACK_H;
    this._thumb.style.top = `${thumbTopPx}px`;

    // Fill bar: from center to thumb
    const centerPx = TRACK_H / 2;
    if (v > 0) {
      const fillH = centerPx - thumbTopPx;
      this._fill.style.top        = `${thumbTopPx}px`;
      this._fill.style.height     = `${fillH}px`;
      this._fill.style.background = 'var(--fwd)';
    } else if (v < 0) {
      const fillH = thumbTopPx - centerPx;
      this._fill.style.top        = `${centerPx}px`;
      this._fill.style.height     = `${fillH}px`;
      this._fill.style.background = 'var(--rev)';
    } else {
      this._fill.style.height = '0';
    }

    // Card state class
    this._card.classList.remove('fwd', 'rev');
    if (v > 0) this._card.classList.add('fwd');
    if (v < 0) this._card.classList.add('rev');

    // Readout text
    const pct = Math.round(Math.abs(v) * 100);
    if (v === 0) {
      this._ro.textContent = '---';
    } else {
      this._ro.textContent = `${pct}%  ${v > 0 ? 'FWD' : 'REV'}`;
    }
  }
}


// ─────────────────────────────────────────────────────────────────────────────
//  Initialise
// ─────────────────────────────────────────────────────────────────────────────
const sliders = MOTOR_NAMES.map(name => new MotorCard(name));
const grid    = document.getElementById('motorGrid');
sliders.forEach(s => grid.appendChild(s.el));

// Restore or auto-detect connection info
const savedHost = localStorage.getItem('robot_host');
const savedPort = localStorage.getItem('robot_port');

if (savedHost) {
  hostInput.value = savedHost;
  portInput.value = savedPort || '9300';
} else if (window.location.hostname && window.location.hostname !== '') {
  // Page was loaded from the Pi — use the same host automatically
  hostInput.value = window.location.hostname;
  portInput.value = window.location.port || '9300';
}

// Auto-connect if we have something to connect to
if (hostInput.value) {
  connect();
}

applyMomentary();

</script>
</body>
</html>
